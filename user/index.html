<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Login</title>
    <!-- Google Fonts: Poppins -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        res="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <main class="login-wrapper">
        <div class="login-card">

            <!-- Header Section -->
            <div class="brand">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M18 8H19C20.1046 8 21 8.89543 21 10V11C21 12.1046 20.1046 13 19 13H18M18 8V18C18 19.1046 17.1046 20 16 20H6C4.89543 20 4 19.1046 4 18V8H18Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M6 4H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M8 4V2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M14 4V2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
                <h1 class="heading">Welcome Back ☕</h1>
                <p class="subtext">Login to order faster & earn rewards</p>
            </div>

            <!-- Steps Container -->
            <div class="steps-container" id="steps-container">

                <!-- Step 1: Phone Input -->
                <div class="step step-active" id="step-phone">
                    <form id="phone-form">
                        <div class="input-group">
                            <div class="country-code">
                                <span class="flag">🇮🇳</span>
                                <span>+91</span>
                            </div>
                            <input type="tel" id="phone-number" placeholder="Enter your phone number" required
                                autocomplete="tel" pattern="[0-9]{10}" maxlength="10">
                        </div>
                        <div id="recaptcha-container"></div>
                        <button type="submit" class="primary-btn" id="send-otp-btn">
                            <span class="btn-text">Send OTP</span>
                            <span class="loader hidden"></span>
                        </button>
                    </form>

                    <!-- DEVELOPMENT ONLY LOGIN (Wrap in DEV flag) -->
                    <div id="dev-login-container" class="dev-mode-only">
                        <button type="button" class="dev-btn" id="dev-login-btn">
                            <span class="btn-text">Continue as Guest <span class="dev-badge">DEV</span></span>
                        </button>
                        <p class="dev-helper-text">For development & testing only</p>
                    </div>

                </div>

                <!-- Step 2: OTP Input -->
                <div class="step" id="step-otp">
                    <form id="otp-form">
                        <div class="otp-instruction">
                            <p>Enter the 4-digit code sent to<br><strong id="display-phone">+91 00000 00000</strong></p>
                        </div>
                        <div class="otp-inputs">
                            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
                            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
                            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
                            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
                            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
                            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" required>
                        </div>
                        <p class="resend-text">Resend OTP in <span id="timer">30s</span></p>
                        <button type="submit" class="primary-btn" id="verify-otp-btn">
                            <span class="btn-text">Verify & Continue</span>
                            <span class="loader hidden"></span>
                        </button>
                    </form>
                    <button class="back-link" id="edit-phone-btn">Edit phone number</button>
                </div>

            </div>

            <p class="terms-text">By continuing, you agree to our <a href="#">Terms & Privacy Policy</a></p>
        </div>
        </div>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
        <script src="js/login.js"></script>
</body>

</html>
