<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F2EEE9">
    <title>Desi Chulha - Combos & Thalis</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/combos-mobile.css">
</head>

<body>

    <main class="app-content">
        <!-- Header Section -->
        <header class="page-header">
            <h1 class="page-title">Combos & Thalis 🍽</h1>
            <p class="subtitle">Best value meals, made for sharing.</p>
        </header>

        <!-- Empty State UI (Hidden by default, shown if no combos exist) -->
        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">😋</div>
            <h2>Hungry?</h2>
            <p>Try our delicious value combos built to satisfy your cravings.</p>
        </div>

        <!-- Dynamic Admin Combos (Single Source of Truth) -->
        <section class="combo-category" id="dynamic-combos-section" style="display: none;">
            <h2 class="category-title">Special Combo Offers 🍱</h2>
            <div id="dynamic-combos-grid">
                <!-- Injected via combos.js -->
            </div>
        </section>

        <div class="bottom-spacer"></div>
    </main>

    <!-- Sticky Cart Toolbar -->
    <div id="combo-sticky-cart" class="sticky-cart hidden">
        <div class="cart-details">
            <p class="cart-count" id="cart-count">1 Combo</p>
            <p class="cart-total" id="cart-total">₹149</p>
        </div>
        <button class="btn-checkout">
            View Cart <span class="arrow-right">→</span>
        </button>
    </div>

    <!-- Success Floating Toast Animation -->
    <div id="toast-msg" class="toast hidden">Added to cart ✨</div>

    <script src="../../utils/comboStorage.js"></script>
    <script src="../js/cart-manager.js"></script>
    <script src="../js/combos.js"></script>
</body>

</html>
