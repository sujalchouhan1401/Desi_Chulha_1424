<!-- admin/pages/customers.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <!-- CSS and Layout injection managed by admin.js -->
    <script src="../../utils/orderStorage.js"></script>
    <script src="../../utils/customerStats.js"></script>
    <script src="../utils/admin.js"></script>
    <script src="../js/pages/customers.js"></script>
    <style>
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 8px 12px;
            border: 1px solid var(--admin-border);
            border-radius: 6px;
            width: 250px;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--admin-border);
            border-radius: 6px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .customer-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .info-card h4 {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 5px;
        }

        .info-card p {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--admin-text-main);
        }

        .history-table {
            margin-top: 20px;
        }

        .history-table th {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #64748b;
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .history-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="admin-body">
    <div id="admin-root">
        <div class="admin-card">
            <div class="flex-between">
                <div>
                    <h3>Direct Customers</h3>
                    <p style="font-size: 0.85rem; color: #666;">View and analyze your most loyal clients.</p>
                </div>
                <div class="search-filters">
                    <input type="text" id="customer-search" class="search-input"
                        placeholder="Search by name or phone...">
                    <select id="sort-customers" class="filter-select">
                        <option value="name">Sort by: Name</option>
                        <option value="orders">Sort by: Total Orders</option>
                        <option value="spent">Sort by: Total Spent</option>
                        <option value="latest">Sort by: Latest Order</option>
                    </select>
                </div>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Phone/ID</th>
                        <th>Total Orders</th>
                        <th>Total Spent</th>
                        <th>Last Order</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customer-tbody">
                    <!-- Dynamic rendering by customers.js -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Customer Details Modal -->
    <div class="modal-overlay" id="customer-modal">
        <div class="modal-content">
            <button id="close-modal"
                style="position:absolute; right:15px; top:15px; border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h3 id="detail-customer-name">Customer Details</h3>

            <div class="customer-info-grid">
                <div class="info-card">
                    <h4>Customer Phone</h4>
                    <p id="detail-phone">N/A</p>
                </div>
                <div class="info-card">
                    <h4>Total Orders</h4>
                    <p id="detail-total-orders">0</p>
                </div>
                <div class="info-card">
                    <h4>Total Spent</h4>
                    <p id="detail-total-spent">₹0</p>
                </div>
            </div>

            <div class="history-table">
                <h4 style="margin-bottom: 15px;">Order History</h4>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
