<!-- admin/pages/offers.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Discounts</title>
    <script src="../../utils/offerStorage.js"></script>
    <script src="../utils/admin.js"></script>
    <script src="../js/pages/offers.js"></script>
</head>

<body class="admin-body">
    <div id="admin-root">
        <div class="admin-card">
            <div class="flex-between">
                <h3>Discount Offers</h3>
                <button class="admin-btn" id="add-offer-btn"><i class="fas fa-plus"></i> Create Discount</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Offer Code</th>
                        <th>Discount Value</th>
                        <th>Expiry Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="offer-tbody">
                    <!-- Dynamic rendering by offers.js -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
