<!-- admin/pages/menu.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <script src="../../utils/menuStorage.js"></script>
    <script src="../utils/admin.js"></script>
    <script src="../js/pages/menu.js"></script>
    <style>
        .menu-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            font-size: 1rem;
            color: var(--admin-text-muted);
        }

        .menu-action-btn.edit {
            color: #4f46e5;
        }

        .menu-action-btn.delete {
            color: #ef4444;
        }

        .menu-action-btn:hover {
            color: var(--admin-text-main);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            background: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--admin-border);
            border-radius: 6px;
        }

        .form-group.checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group.checkbox-group label {
            margin-bottom: 0;
        }

        .form-group.checkbox-group input {
            width: auto;
        }
    </style>
</head>

<body class="admin-body">
    <div id="admin-root">
        <div class="admin-card">
            <div class="flex-between">
                <div>
                    <h3>Menu Items</h3>
                    <p style="font-size: 0.85rem; color: #666;">Control what appears on the user menu.</p>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="admin-btn" id="add-menu-btn"><i class="fas fa-plus"></i> Add New Item</button>
                </div>
            </div>

            <!-- Refined Filters Bar -->
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; padding: 15px; background: #fafafa; border-radius: 8px; border: 1px solid #eee; align-items: center;">
                <div style="position: relative; min-width: 0;">
                    <i class="fas fa-search"
                        style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999;"></i>
                    <input type="text" id="admin-search" placeholder="Search dish name by typing..."
                        style="width: 100%; padding: 10px 10px 10px 40px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box;">
                </div>
                <div style="min-width: 180px;">
                    <select id="admin-category-filter"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; background: white; cursor: pointer; box-sizing: border-box;">
                        <option value="all">📁 All Categories</option>
                        <option value="Beverage">☕ Beverage</option>
                        <option value="Chaat">🥟 Chaat</option>
                        <option value="Street Food">🥙 Street Food</option>
                        <option value="Paratha">🫓 Paratha</option>
                        <option value="South Indian">🌮 South Indian</option>
                        <option value="Soup">🥣 Soup</option>
                        <option value="Bread">🍞 Bread</option>
                        <option value="Quick Bites">🍜 Quick Bites</option>
                        <option value="Thali">🍱 Thali</option>
                    </select>
                </div>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Availability</th>
                        <th>Bestseller</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="menu-tbody">
                    <!-- Dynamic rendering by menu.js -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Item Modal -->
    <div class="modal-overlay" id="menu-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <h3 id="modal-title">Add Menu Item</h3>
            <form id="menu-form" style="margin-top: 20px;">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="menu-name" placeholder="e.g. Pav Bhaji" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="menu-category" required>
                        <option value="Beverage">Beverage</option>
                        <option value="Chaat">Chaat</option>
                        <option value="Street Food">Street Food</option>
                        <option value="Paratha">Paratha</option>
                        <option value="South Indian">South Indian</option>
                        <option value="Soup">Soup</option>
                        <option value="Bread">Bread</option>
                        <option value="Quick Bites">Quick Bites</option>
                        <option value="Thali">Thali</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="menu-price" placeholder="120" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="menu-image" placeholder="Image URL (optional)">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="menu-bestseller">
                    <label for="menu-bestseller">Mark as Bestseller ⭐</label>
                </div>
                <button type="submit" class="admin-btn" style="width: 100%; margin-top: 10px;" id="save-btn">Save Menu
                    Item</button>
            </form>
        </div>
    </div>
</body>

</html>
