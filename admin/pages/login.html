<!-- admin/pages/login.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Desi Chulha</title>
    <!-- Use the existing global styles plus admin specific ones -->
    <script src="../utils/admin.js"></script>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #2b3440;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            margin-top: 0;
            color: #4f46e5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .admin-btn:hover {
            background: #4338ca;
        }

        .error-msg {
            color: #ef4444;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2><i class="fas fa-lock" style="margin-right:8px;"></i>Admin Panel</h2>
        <p style="color:#6b7280; margin-bottom: 30px;">Sign in to access the dashboard</p>

        <form id="admin-login-form">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="email" value="admin@desichulha.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="admin123" required>
            </div>
            <button type="submit" class="admin-btn">Login to Dashboard</button>
            <p class="error-msg" id="login-error">Invalid credentials</p>
        </form>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Simple mock auth for demonstration
            if (email === 'admin@desichulha.com' && pass === 'admin123') {
                localStorage.setItem('admin_token', 'mock_admin_token_123');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        });
    </script>
</body>

</html>
