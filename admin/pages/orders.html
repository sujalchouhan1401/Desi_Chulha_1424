<!-- admin/pages/orders.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders</title>
    <script src="../utils/orderStorage.js"></script>
    <script src="../utils/admin.js"></script>
    <script src="../js/pages/orders.js"></script>
    <style>
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--admin-border);
        }
    </style>
</head>

<body class="admin-body">
    <div id="admin-root">
        <div class="admin-card">
            <div class="filter-bar">
                <input type="text" placeholder="Search Order ID..." style="flex:1;">
                <select>
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="completed">Completed</option>
                </select>
                <input type="date">
                <button class="admin-btn">Filter</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date & Time</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#ORD-8923</td>
                        <td>Today, 14:30</td>
                        <td>Rahul Kumar</td>
                        <td>₹1,450</td>
                        <td>
                            <select style="padding:5px; border-radius:4px;">
                                <option value="pending" selected>Pending</option>
                                <option value="processing">Processing</option>
                                <option value="completed">Completed</option>
                            </select>
                        </td>
                        <td>
                            <button class="admin-btn" style="padding:6px 12px; font-size: 0.85rem;"
                                onclick="alert('Viewing details')">Details</button>
                        </td>
                    </tr>
                    <tr>
                        <td>#ORD-8922</td>
                        <td>Today, 13:15</td>
                        <td>Priya Singh</td>
                        <td>₹890</td>
                        <td>
                            <select style="padding:5px; border-radius:4px;">
                                <option value="pending">Pending</option>
                                <option value="processing">Processing</option>
                                <option value="completed" selected>Completed</option>
                            </select>
                        </td>
                        <td>
                            <button class="admin-btn" style="padding:6px 12px; font-size: 0.85rem;">Details</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
