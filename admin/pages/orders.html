<!-- admin/pages/orders.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders</title>
    <script src="../utils/admin.js"></script>
    <script src="../js/pages/orders.js"></script>
    <style>
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--admin-border);
        }
    </style>
</head>

<body class="admin-body">
    <div id="admin-root">
        <div class="admin-card">
            <div class="filter-bar">
                <input type="text" id="search-order" placeholder="Search Order ID..." style="flex:1;">
                <select id="status-filter">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="preparing">Preparing</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <input type="date" id="date-filter">
                <button class="admin-btn" onclick="applyFilters()">Filter</button>
                <button class="admin-btn" onclick="clearFilters()" style="background:#6b7280;">Clear</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date & Time</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Orders will be dynamically loaded here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
