<!-- admin/pages/reports.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Analytics & Reports</title>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../utils/orderStorage.js"></script>
    <script src="../../utils/reportStats.js"></script>
    <script src="../utils/admin.js"></script>
    <script src="../js/pages/reports.js"></script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            min-height: 350px;
        }

        .report-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .report-card .label {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 5px;
            display: block;
        }

        .report-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--admin-text-main);
        }

        .top-items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .top-items-table th {
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .top-items-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        .trend-up {
            color: #059669;
        }

        .trend-down {
            color: #dc2626;
        }
    </style>
</head>

<body class="admin-body">
    <div id="admin-root">
        <!-- Summary Section -->
        <div class="analytics-grid">
            <div class="report-card">
                <span class="label">Total Revenue</span>
                <div class="value" id="rep-total-revenue">₹0</div>
            </div>
            <div class="report-card">
                <span class="label">Total Orders</span>
                <div class="value" id="rep-total-orders">0</div>
            </div>
            <div class="report-card">
                <span class="label">Avg. Order Value</span>
                <div class="value" id="rep-aov">₹0</div>
            </div>
            <div class="report-card">
                <span class="label">Growth Status</span>
                <div class="value trend-up"><i class="fas fa-arrow-up"></i> +12%</div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="chart-row">
            <div class="chart-container">
                <h4 style="margin-bottom: 15px;">Sales Trend (Weekly)</h4>
                <canvas id="salesTrendChart"></canvas>
            </div>
            <div class="chart-container">
                <h4 style="margin-bottom: 15px;">Order Status Distribution</h4>
                <canvas id="statusDistributionChart"></canvas>
            </div>
        </div>

        <!-- Table Section -->
        <div class="admin-card">
            <h3>Top Selling Delicacies 🏆</h3>
            <p style="font-size:0.85rem; color:#666; margin-bottom: 15px;">Based on item frequency in completed orders.
            </p>
            <table class="top-items-table">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Orders Count</th>
                        <th>Revenue Contribution</th>
                        <th>Performance</th>
                    </tr>
                </thead>
                <tbody id="top-items-tbody">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
